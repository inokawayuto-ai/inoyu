<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comic Snap Studio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="workspace" aria-label="漫画化プレビュー">
      <div class="topbar">
        <div>
          <h1>Comic Snap Studio</h1>
          <p>写真を読み込んで、漫画の1コマみたいに仕上げるツールです。</p>
        </div>
        <button id="downloadButton" class="primary" type="button" disabled>
          <span aria-hidden="true">↓</span>
          PNG保存
        </button>
      </div>

      <div class="stage-wrap">
        <canvas id="canvas" width="1200" height="820" aria-label="漫画化された写真"></canvas>
        <label id="dropZone" class="drop-zone" for="photoInput">
          <strong>写真を選択</strong>
          <span>またはここにドラッグ</span>
        </label>
      </div>
    </section>

    <aside class="panel" aria-label="編集コントロール">
      <label class="upload-button" for="photoInput">
        <span aria-hidden="true">＋</span>
        写真を読み込む
      </label>
      <input id="photoInput" type="file" accept="image/*">

      <fieldset>
        <legend>漫画タッチ</legend>
        <div class="segmented" role="group" aria-label="漫画タッチ">
          <button class="mode active" type="button" data-mode="color">カラー</button>
          <button class="mode" type="button" data-mode="mono">白黒</button>
          <button class="mode" type="button" data-mode="poster">ポスター</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>調整</legend>
        <label>
          輪郭
          <input id="edgeRange" type="range" min="0" max="100" value="72">
        </label>
        <label>
          色の強さ
          <input id="colorRange" type="range" min="0" max="100" value="70">
        </label>
        <label>
          網点
          <input id="dotRange" type="range" min="0" max="100" value="34">
        </label>
        <label>
          コントラスト
          <input id="contrastRange" type="range" min="0" max="100" value="58">
        </label>
      </fieldset>

      <fieldset>
        <legend>演出</legend>
        <label class="check">
          <input id="speedLines" type="checkbox" checked>
          集中線
        </label>
        <label class="check">
          <input id="panelFrame" type="checkbox" checked>
          コマ枠
        </label>
        <label>
          吹き出し
          <input id="captionInput" type="text" maxlength="18" value="最高の一枚!">
        </label>
      </fieldset>

      <button id="resetButton" class="secondary" type="button">初期値に戻す</button>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
